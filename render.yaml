services:
  - type: web
    name: just-in-consultancy
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: pnpm install && pnpm run build:render
    startCommand: pnpm run start:render
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: just-in-consultancy-db
          property: connectionString

databases:
  - name: just-in-consultancy-db
    plan: free
    region: oregon
